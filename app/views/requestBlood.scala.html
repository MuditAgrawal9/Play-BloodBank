@layout("Request Blood","HOSPITAL") {

    <h2>Request Blood</h2>

    <form action="/request-blood" method="POST">

        <div>

            <label>Blood Group</label>

            <select name="bloodGroup">

                <option>A+</option>
                <option>A-</option>

                <option>B+</option>
                <option>B-</option>

                <option>AB+</option>
                <option>AB-</option>

                <option>O+</option>
                <option>O-</option>

            </select>

        </div>

        <div>

            <label>Units</label>

            <input
            type="number"
            name="units">

        </div>

        <button type="submit">
            Submit Request
        </button>

    </form>

}
