@(donor: Donor)
@main("Donor Profile") {

    <h2>Donor Profile</h2>

    <form action="/profile" method="POST">

        <div>
            <p>Name - @donor.getUser.getName</p>
        </div>
        <div>
            <p>Email - @donor.getUser.getEmail</p>
        </div>

        <div>
            <label>Blood Group</label>

            <select name="bloodGroup">

                <option value="A+" @if(donor != null && donor.getBloodGroup().equals("A+")){selected}>A+</option>
                <option value="A-" @if(donor != null && donor.getBloodGroup().equals("A-")){selected}>A-</option>

                <option value="B+" @if(donor != null && donor.getBloodGroup().equals("B+")){selected}>B+</option>
                <option value="B-" @if(donor != null && donor.getBloodGroup().equals("B-")){selected}>B-</option>

                <option value="AB+" @if(donor != null && donor.getBloodGroup().equals("AB+")){selected}>AB+</option>
                <option value="AB-" @if(donor != null && donor.getBloodGroup().equals("AB-")){selected}>AB-</option>

                <option value="O+" @if(donor != null && donor.getBloodGroup().equals("O+")){selected}>O+</option>
                <option value="O-" @if(donor != null && donor.getBloodGroup().equals("O-")){selected}>O-</option>

            </select>
        </div>

        <div>
            <label>Age</label>
            <input type="number" name="age" value="@if(donor != null){@donor.getAge()}">
        </div>

        <div>
            <label>Phone</label>
            <input type="text" name="phone" value="@if(donor != null){@donor.getUser.getPhone()}">
        </div>

        <div>
            <label>City</label>
            <input type="text" name="city" value="@if(donor != null){@donor.getUser.getCity()}">
        </div>

        <div>
            <label>Address</label>
            <input type="text" name="address" value="@if(donor != null){@donor.getUser.getAddress()}">
        </div>

        <button type="submit">
            Update Profile
        </button>

    </form>

}
